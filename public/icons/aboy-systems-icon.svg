<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Aboy Systems app icon</title>
  <desc id="desc">A dark premium app icon with a compact AS mark and automation-flow accents.</desc>
  <defs>
    <linearGradient id="base" x1="72" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827" />
      <stop offset="0.52" stop-color="#070B14" />
      <stop offset="1" stop-color="#02040A" />
    </linearGradient>
    <linearGradient id="edge" x1="72" y1="40" x2="440" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.7" />
      <stop offset="0.52" stop-color="#22D3EE" stop-opacity="0.22" />
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.58" />
    </linearGradient>
    <linearGradient id="flow" x1="106" y1="340" x2="414" y2="156" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" />
      <stop offset="0.5" stop-color="#60A5FA" />
      <stop offset="1" stop-color="#A78BFA" />
    </linearGradient>
    <linearGradient id="mark" x1="152" y1="168" x2="366" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.58" stop-color="#E5EEFF" />
      <stop offset="1" stop-color="#BBD7FF" />
    </linearGradient>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#05070D" />
  <rect x="42" y="42" width="428" height="428" rx="104" fill="url(#base)" />
  <rect x="45" y="45" width="422" height="422" rx="101" fill="none" stroke="url(#edge)" stroke-width="6" />
  <path
    d="M106 336C162 246 222 262 264 306C311 354 350 252 410 158"
    fill="none"
    stroke="url(#flow)"
    stroke-width="17"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.42"
  />
  <circle cx="116" cy="326" r="28" fill="#07111D" stroke="#22D3EE" stroke-width="10" opacity="0.88" />
  <circle cx="396" cy="176" r="28" fill="#0D0B1B" stroke="#A78BFA" stroke-width="10" opacity="0.88" />
  <text
    x="256"
    y="315"
    text-anchor="middle"
    font-family="Geist, Inter, Arial, sans-serif"
    font-size="164"
    font-weight="850"
    letter-spacing="6"
    fill="url(#mark)"
    filter="url(#soft-glow)"
  >AS</text>
  <path d="M150 374H362" stroke="url(#flow)" stroke-width="10" stroke-linecap="round" opacity="0.74" />
</svg>
